kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash -c 'cd /home/runner/workspace/backend && python3 -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8080'"

[services.production]

[services.production.build]
args = ["bash", "-c", "echo 'No build step for Python backend'"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace/backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
